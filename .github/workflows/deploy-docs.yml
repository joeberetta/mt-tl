name: Deploy docs to GitHub Pages

on:
    push:
        branches: [master]
        # Only rebuild when the docs content or the site tooling changes.
        paths:
            - 'docs/**'
            - 'website/**'
            - '.github/workflows/deploy-docs.yml'
    workflow_dispatch:

# Least privilege for the GITHUB_TOKEN: read the repo, publish to Pages via OIDC.
permissions:
    contents: read
    pages: write
    id-token: write

# One deploy at a time; let an in-progress run finish (don't cancel a publish).
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
            # The repo pins yarn@4 via package.json "packageManager"; corepack honours it.
            - run: corepack enable
            - run: yarn install --immutable
            - run: yarn workspace mt-tl-docs build
            - uses: actions/configure-pages@v5
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: website/build

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
