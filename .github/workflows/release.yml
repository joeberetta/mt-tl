name: Publish packages to npm

# Publishes the public workspaces (@mt-tl/tl, @mt-tl/server, @mt-tl/testing) when
# you push a version tag, e.g.:
#   bump versions in packages/*/package.json → git tag v0.1.2 → git push --tags
# Or run it by hand from the Actions tab (workflow_dispatch).
#
# AUTH: npm "trusted publishing" (OIDC) — no token, no secret. One-time, ON NPM,
# configure a Trusted Publisher PER package (@mt-tl/tl, @mt-tl/server,
# @mt-tl/testing): npmjs.com → the package → Settings → Trusted Publisher → GitHub
# Actions → repo `joeberetta/mt-tl`, workflow file `release.yml`. NB: a package
# that has never been published yet can't get a trusted publisher — do its first
# publish once with a token, after which it goes tokenless like the rest.
on:
    push:
        tags: ['v*']
    workflow_dispatch:

permissions:
    contents: read
    id-token: write # OIDC: npm trusted-publishing auth + provenance attestation

# One publish at a time; let an in-progress release finish (never cancel a publish).
concurrency:
    group: npm-publish
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
            # The repo pins yarn@4 via package.json "packageManager"; corepack honours it.
            - run: corepack enable
            - run: yarn install --immutable

            # Gate: never publish a tag that doesn't typecheck or whose tests fail.
            - run: yarn typecheck
            - run: yarn test

            # Publish via the npm CLI, because npm's OIDC trusted publishing (tokenless)
            # is an npm-CLI feature — Yarn's own publisher only auths by token. For each
            # package (in prod-dep order tl → server → testing) we `yarn pack` it (which
            # rewrites workspace:* deps to real versions AND runs prepack → builds dist),
            # then hand the tarball to `npm publish`, which does the OIDC exchange against
            # that package's configured trusted publisher. Versions already on npm are
            # skipped, so re-running a tag is safe. Trusted publishing needs npm >= 11.5.1
            # (newer than the runner's bundled npm), so upgrade it first.
            - run: npm install -g npm@latest
            - name: Publish (OIDC trusted publishing)
              run: |
                  set -euo pipefail
                  for pkg in tl server testing; do
                      name="@mt-tl/$pkg"
                      ver="$(node -p "require('./packages/$pkg/package.json').version")"
                      if npm view "$name@$ver" version >/dev/null 2>&1; then
                          echo "::notice::$name@$ver already on npm — skipping"
                          continue
                      fi
                      yarn workspace "$name" pack --out "$RUNNER_TEMP/$pkg.tgz"
                      npm publish "$RUNNER_TEMP/$pkg.tgz" --access public --provenance
                  done
