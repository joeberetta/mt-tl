nodeLinker: node-modules

enableTelemetry: false

# Resolve and publish against the canonical npm registry. Yarn's built-in
# default is the read-only registry.yarnpkg.com mirror, which 404s on publish
# (PUT). The lockfile stores registry-agnostic `npm:` resolutions, so this only
# changes the host, not resolutions. Auth comes from YARN_NPM_AUTH_TOKEN.
npmRegistryServer: "https://registry.npmjs.org"
